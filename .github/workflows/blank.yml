name: Build Flatpak

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install required SDK and runtime
        run: |
          flatpak install -y flathub org.freedesktop.Platform//24.08
          flatpak install -y flathub org.freedesktop.Sdk//24.08
          # Si tu app necesita Qt, instala org.kde.Platform en su lugar y cambia el manifest

      - name: Build flatpak
        run: |
          flatpak-builder --repo=repo --force-clean build-dir flatpak/io.github.ErzaGOD19.W-Engine-Pro.json

      - name: Create bundle
        run: |
          flatpak build-bundle repo w-engine-pro.flatpak io.github.ErzaGOD19.W-Engine-Pro

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: W-Engine-Pro.flatpak
          path: w-engine-pro.flatpak
